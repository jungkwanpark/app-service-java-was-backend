<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
</head>
<body>
    <h2>회원가입</h2>
    <p>아이디와 비밀번호만 입력해주세요.</p>
    <form action="/signup" method="post">
        <input type="text" name="userId" placeholder="아이디 입력" required><br>
        <input type="password" name="userPw" placeholder="비밀번호 입력" required><br><br>
        <button type="submit">가입하기</button>
    </form>
</body>
</html>
